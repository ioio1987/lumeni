version: '3.8'
services:
  auth-service:
    build:
      context: .
      dockerfile: UserManagement.API/Dockerfile # set correct path to Dockerfile
    container_name: auth_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__Postgres_AuthServer=Host=postgres_db;Port=5432;Database=AuthServer;Username=admin;Password=Syllogia123
      - RabbitMqOptions__Host=erp_rabbitmq
    networks:
      - erp-common-network
    ports:
      - "5001:8080"

networks:
  erp-common-network:
    external: true
